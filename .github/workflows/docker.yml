name: Docker Build

on:
  release:
    types:
      - published
  push:
    tags:
    branches:
      - main
      - dev

jobs:
  docker-build:
    runs-on: ubuntu-latest
    name: Deploy Docker Image
    permissions:
      packages: write

    steps:
      - name: Wait for checks to succeed
        uses: lewagon/wait-on-check-action@master
        with:
          ref: ${{ github.ref }}
          check-regexp: "Verify.*"
          running-workflow-name: 'Deploy Docker Image'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          allowed-conclusions: success
      - uses: actions/checkout@v7
      - uses: gradle/actions/wrapper-validation@v6
      - name: Build Image
        run: docker build . --build-arg GITHUB_ACTIONS=true --build-arg GITHUB_REF_TYPE=${{ github.ref_type }} --build-arg GITHUB_REF_NAME=${{ github.ref_name }} --build-arg GITHUB_SHA=${{ github.sha }} -f Dockerfile -t ghcr.io/${{ github.repository }}:${{ github.sha }}
      - name: Login to Registry
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login -u $ --password-stdin ghcr.io
      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository }}:${{ github.sha }}
      - name: Tag & Push branch image
        run: |
          docker image tag ghcr.io/${{ github.repository }}:${{ github.sha }} ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          docker push ghcr.io/${{ github.repository }}:${{ github.ref_name }}
      - name: Tag & Push latest image
        if: github.ref_name == 'main'
        run: |
          docker image tag ghcr.io/${{ github.repository }}:${{ github.sha }} ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:latest
      - name: Tag & Push version images
        if: github.event_name == 'release'
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          MAJOR="${VERSION%%.*}"
          MINOR="${VERSION#*.}"
          MINOR="${MINOR%%.*}"
          IMAGE="ghcr.io/${{ github.repository }}"
          docker image tag "$IMAGE:${{ github.sha }}" "$IMAGE:v$MAJOR"
          docker image tag "$IMAGE:${{ github.sha }}" "$IMAGE:v$MAJOR.$MINOR"
          docker image tag "$IMAGE:${{ github.sha }}" "$IMAGE:v$VERSION"
          docker push "$IMAGE:v$MAJOR"
          docker push "$IMAGE:v$MAJOR.$MINOR"
          docker push "$IMAGE:v$VERSION"
